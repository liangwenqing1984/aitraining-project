<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    
    <!-- 网格渐变 -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="0.5"/>
    </pattern>
    
    <!-- 光晕效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 节点光晕 -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 数据流光效 -->
    <linearGradient id="dataFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="800" height="900" fill="url(#mainGradient)"/>
  
  <!-- 网格层 -->
  <rect width="800" height="900" fill="url(#gridPattern)"/>
  
  <!-- 大型装饰圆环 -->
  <circle cx="650" cy="200" r="180" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1">
    <animate attributeName="r" values="180;190;180" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="200" r="140" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="0.8">
    <animate attributeName="r" values="140;148;140" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="200" r="100" fill="none" stroke="rgba(59,130,246,0.04)" stroke-width="0.5">
    <animate attributeName="r" values="100;106;100" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 左下角装饰圆环 -->
  <circle cx="150" cy="750" r="120" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="0.8">
    <animate attributeName="r" values="120;128;120" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="750" r="80" fill="none" stroke="rgba(99,102,241,0.04)" stroke-width="0.5">
    <animate attributeName="r" values="80;86;80" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- 数据流线条 - 水平方向 -->
  <g opacity="0.15">
    <line x1="0" y1="150" x2="800" y2="150" stroke="url(#dataFlow)" stroke-width="1">
      <animate attributeName="x1" values="-100;800" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;900" dur="12s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="350" x2="800" y2="350" stroke="url(#dataFlow)" stroke-width="0.8">
      <animate attributeName="x1" values="-150;800" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-50;900" dur="15s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="550" x2="800" y2="550" stroke="url(#dataFlow)" stroke-width="1">
      <animate attributeName="x1" values="-80;800" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20;900" dur="10s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="750" x2="800" y2="750" stroke="url(#dataFlow)" stroke-width="0.8">
      <animate attributeName="x1" values="-120;800" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-20;900" dur="14s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 数据流线条 - 垂直方向 -->
  <g opacity="0.12">
    <line x1="200" y1="0" x2="200" y2="900" stroke="url(#dataFlow)" stroke-width="0.8">
      <animate attributeName="y1" values="-100;900" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;1000" dur="13s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="0" x2="500" y2="900" stroke="url(#dataFlow)" stroke-width="1">
      <animate attributeName="y1" values="-80;900" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="20;1000" dur="11s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 六边形蜂巢结构 -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.8" fill="none">
    <polygon points="100,100 130,85 160,100 160,130 130,145 100,130"/>
    <polygon points="160,100 190,85 220,100 220,130 190,145 160,130"/>
    <polygon points="130,145 160,130 190,145 190,175 160,190 130,175"/>
    <polygon points="600,600 630,585 660,600 660,630 630,645 600,630"/>
    <polygon points="660,600 690,585 720,600 720,630 690,645 660,630"/>
    <polygon points="630,645 660,630 690,645 690,675 660,690 630,675"/>
  </g>

  <!-- 主要节点网络 -->
  <!-- 中心大节点 -->
  <circle cx="400" cy="450" r="25" fill="url(#nodeGlow)" filter="url(#glow)"/>
  <circle cx="400" cy="450" r="8" fill="#3b82f6" opacity="0.9">
    <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="450" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="18;28;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 一级节点 -->
  <circle cx="250" cy="300" r="15" fill="url(#nodeGlow)"/>
  <circle cx="250" cy="300" r="5" fill="#60a5fa" opacity="0.85">
    <animate attributeName="r" values="5;7;5" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="550" cy="350" r="15" fill="url(#nodeGlow)"/>
  <circle cx="550" cy="350" r="5" fill="#60a5fa" opacity="0.85">
    <animate attributeName="r" values="5;7;5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="300" cy="600" r="15" fill="url(#nodeGlow)"/>
  <circle cx="300" cy="600" r="5" fill="#818cf8" opacity="0.8">
    <animate attributeName="r" values="5;7;5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="500" cy="580" r="15" fill="url(#nodeGlow)"/>
  <circle cx="500" cy="580" r="5" fill="#818cf8" opacity="0.8">
    <animate attributeName="r" values="5;7;5" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- 二级节点 -->
  <circle cx="180" cy="450" r="10" fill="url(#nodeGlow)"/>
  <circle cx="180" cy="450" r="3.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="r" values="3.5;5;3.5" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="620" cy="480" r="10" fill="url(#nodeGlow)"/>
  <circle cx="620" cy="480" r="3.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="r" values="3.5;5;3.5" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="350" cy="200" r="10" fill="url(#nodeGlow)"/>
  <circle cx="350" cy="200" r="3.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="r" values="3.5;5;3.5" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="450" cy="700" r="10" fill="url(#nodeGlow)"/>
  <circle cx="450" cy="700" r="3.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="r" values="3.5;5;3.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 连接线 -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.15" stroke-dasharray="5,5">
    <line x1="400" y1="450" x2="250" y2="300">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="450" x2="550" y2="350">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="450" x2="300" y2="600">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="450" x2="500" y2="580">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="300" x2="180" y2="450">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="350" x2="620" y2="480">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="300" x2="350" y2="200">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="600" x2="450" y2="700">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="2.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 散布的小数据点 -->
  <g opacity="0.2">
    <circle cx="120" cy="200" r="2" fill="#60a5fa">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="250" r="1.5" fill="#818cf8">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="550" r="2" fill="#60a5fa">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="650" r="1.5" fill="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="150" r="1.5" fill="#60a5fa">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="150" r="2" fill="#818cf8">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="700" r="1.5" fill="#a78bfa">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="750" r="2" fill="#60a5fa">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="4.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 右上角科技装饰 -->
  <g opacity="0.08" stroke="#60a5fa" stroke-width="0.8">
    <rect x="680" y="50" width="80" height="80" rx="4" fill="none"/>
    <rect x="690" y="60" width="60" height="60" rx="3" fill="none"/>
    <circle cx="720" cy="90" r="15" fill="none"/>
    <line x1="680" y1="90" x2="705" y2="90"/>
    <line x1="735" y1="90" x2="760" y2="90"/>
    <line x1="720" y1="50" x2="720" y2="75"/>
    <line x1="720" y1="105" x2="720" y2="130"/>
  </g>

  <!-- 左下角装饰元素 -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="0.8">
    <circle cx="80" cy="820" r="30" fill="none"/>
    <circle cx="80" cy="820" r="20" fill="none"/>
    <circle cx="80" cy="820" r="10" fill="none"/>
    <line x1="50" y1="820" x2="110" y2="820"/>
    <line x1="80" y1="790" x2="80" y2="850"/>
  </g>

  <!-- 动态粒子效果 -->
  <g>
    <circle cx="350" cy="350" r="1.5" fill="#60a5fa" opacity="0.4">
      <animate attributeName="cx" values="350;380;350" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;320;350" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="500" r="1.5" fill="#818cf8" opacity="0.4">
      <animate attributeName="cx" values="450;420;450" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;530;500" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="520" r="1.5" fill="#a78bfa" opacity="0.4">
      <animate attributeName="cx" values="320;350;320" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="520;490;520" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
